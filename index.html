<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ✅ FAVICON (NEW CLEAN SETUP) -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    />

    <!-- ✅ OPEN GRAPH (iMessage / social preview) -->
    <meta property="og:title" content="The Ever After Edit — Luxury Wedding Signage" />

      property="og:description"
      content="Custom wedding signage and statement pieces designed to be noticed."
    />
    <meta property="og:image" content="https://everaftereditfl.com/logo.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
